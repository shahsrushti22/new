<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pratice Example</title>
    <style>
        .main{
            width:900px;
            height=200px;
            background-color:blue;
        }
        .row1{
            width: 900px;
            height: 50px;
            background-color:green;
            float: left;
        }
        .row1a{
            width: 300px;
            height: 50px;
            background-color: pink;
            float: left;
        }
        .row1b{
            width: 300px;
            height: 50px;
            background-color: yellow;
            float: left;
        }
        .row1c{
            width: 300px;
            height: 50px;
            background-color: orange;
            float: left;
        }
        .row2{
            width: 900px;
            height: 100px;
            background-color: red;
            float: left;
        }
        .row3{
            width: 900px;
            height: 50px;
            background-color: purple;
          
        }
        .row3a{
            width: 400px;
            height: 50px;
            background-color: cyan;
            float: left;
        }
        .row3b{
            width: 500px;
            height: 50px;
            background-color: magenta;
            float: left;
        }
    
    </style>
</head>
<body>
    <div class="main">
        <div class="row1">
            <div class="row1a">Home</div>
            <div class="row1b">About</div>
            <div class="row1c">Course</div>
        </div>
        <div class="row2">
         <h1>Welcome to my website</h1>
         </div>
         <div class="row3">
            <div class="row3a">Html</div>
            <div class="row3b">Css</div>


         </div>


    </div>
</body>
</html>
