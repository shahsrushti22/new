<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        h1{
            height: 300px;
            width: 200px;
            box-shadow: inset 0px 0px 30px 2px blue;

        }
        .class{
            height: 300px;
            width: 200px;
            margin: auto;
            box-shadow: 0px 0px 20px 2px red, inset 0px 0px 30px 2px blue;
        }
    </style>
</head>
<body>
    <h1>box shadow inset
    </h1>
    <div class="class">
        inside or outside both
    </div>
</body>
</html>
