<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>card</title>
    <style>
      *{
        margin:0 ;
        padding: 0;
        box-sizing: border-box;
      }
      body{
        background-color: #d7f3c9;
        display: flex;
        justify-content: center;
        align-items: center;
        mainheight: -100vh;

      }
      .main{
        width:350px;
        background-color: white;
        padding: 20px;
        margin-top: 60px;
        border-radius: 25px;

      }
      .one img{
        width: 100%;
        height: 250px;
        object-fit: cover;
        object-position: center;
        border-radius: 20px;
      }
      .price{
        display: flex;
        justify-content: space-between;
        margin-top: 10px;
      }
       .price1:nth-child(1){
        color: #f5c518;
        font-weight: bold;
      }
      .name{
        margin-top: 10px;
      }
      .description p{
       margin-top: 10px;

      }
      .ingredients h3{
       margin-top: 15px;
      }
      .ingredients li{
        margin-bottom: 5px;
    
      }
      button{
        width:250px;
        height: 50px;
        margin: 20px auto;
        display: block;
        padding: 15px;
        border-radius: 10px;
        font-size: 18px;
        cursor: pointer;
      }

    </style>
</head>
<body>
    <div class="main">
      <div class="one">
        <img src="b img.webp" alt="image">
      </div>
      <div class="price">
         <span class="price1">BDT 399</span>
         <span class="price1">⭐⭐⭐⭐</span>
      </div>
      <div class="name">
        <h2>Classic Grilled Hamburger</h2>
      </div>
      <div class="description">
        <p>Its a fairly easy to grill a juicy buger.</p>
      </div>
      <DIV  class="ingredients">
           <h3>Ingredients</h3>
           <ul> 
            <li>1 pounds ground chuck</li>
            <li>Fine Salt</li>
            <li>Black Pepper</li>
            <li>4 slices cheese</li>
            <li>Hamburger buns</li>
           </ul>
           
      </DIV>
      <div>
        <button>Add to Cart</button>
      </div>
    </div>
</body>
</html>
