<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body{
            display:flex;
            justify-content:center;
            align-items: center;
            height:100vh;
            background-color: aliceblue;
            
        }
        .main{
           width: 350px;
           background-color: whitesmoke;
           padding: 20px;
           border-radius: 15px;
           border: 2px solid black;
           box-shadow: 0 4px 10px rgba(0,0,0,0.15);
           text-align: center;

           
        
        }
        .main img{
            width: 120px;
            height: 120px;
            border-radius: 50%;
            font-display: block;
            margin: 0 auto 14px;
            object-fit: cover;
            text-align: center;
            cursor: pointer;
            

        }
        .main h1{
            margin-bottom: 10px;
            cursor: pointer;
        }
        .role p{
            font-size: 20px;
            text-transform: capitalize;
            color: rgb(212, 18, 18);
            margin-bottom: 20px;
            cursor: pointer;
        }
        .content p{
            font-size: 17px;
            line-height: 1.5;
            margin-bottom: 20px;
            cursor: pointer;
        }
        .buttons{
           display: flex;
            gap: 20px;
            justify-content: center;
            align-items: center;
            margin-top: 20px;
        }
        button{
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            background-color: royalblue;
            color:white;
            cursor: pointer;
            
        }
        .buttons button:hover{
          background-color: rgb(43, 150, 22);
        }

    </style>
</head>
<body>
    <div class="main">
        
      <img src="srush.jpeg" alt="profile image">
      <h1>Srushti Shah</h1>
      <div class="role">
        <p>Frontend Developer</p>
      </div>
      
    <div class="content">
       <p>frontend developer with experience in front-end and back-end development. Skilled in HTML, CSS, JavaScript, and various frameworks. Passionate about creating responsive and user-friendly web applications.</p>
    </div>
    <div class="buttons">
        <button>Follow</button>
        <button>Message</button>
    </div>
    </div>
   


</body>
</html>
