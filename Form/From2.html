<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Form</title>
</head>
<body>
    <fieldset>
        <legend > Job Application <Form></Form></legend> 
    <form>
        <lable>Name</lable><br/>
        <input type="text" pattern="[a-z A-Z]"{3-20} placeholder="Enter your Name"/><br/>
        <lable>Email</lable><br/>
        <input type="email"  placeholder="Enter your email"/><br/>
        <lable>Phone No</lable><br/>
        <input type="tel" pattern="[0-9]"{10} placeholder="Enter your Mobile no"/><br/>
        <Lable>Degree</Lable><br/>
        <input type="text" placeholder="Enter Your Higest Degree"/><br/>
        <lable>Position</lable><br/>
        <select>
            <option> Frontend Developer</option>
            <option> Backend Developer</option>
            <option> Python Developer</option>
            <option> Data Analysis</option>
            <option> Technical Support</option>
            
        </select><br/>
         <lable>Experience</lable> <br/>
        <select>
            <option>0-1 year</option>
            <option>0-3 year</option>
            <option>3 +year</option>
         </select> <br/>
         <label>Github Site</label><br/>
         <Input type="url"/><br/>
         <label>Linkdin Profile</label><br/>
         <Input type="url"/><br/>
         <label>Uplode Resume</label><br/>
         <input type="file"/><br/>
        <button type="submit">submit</button><br/>
        
    </form>
    </fieldset>
</body>
</html>
