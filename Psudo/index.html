<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>psudo process</title>
    <style>
        h3{
            background-color:palevioletred;
           color: blue;
        }
        .main h3{
            background-color: blueviolet;
            color:white;
            font-size: 40px;
        }
        .second p:first-child{
            background: red;
              color:white;
        }
        p{
            background: plum;
            color: blue;
        }
        .second p:last-child{
            color: deeppink;
        }
        .nth h1:nth-child(2){
            color: brown;
        }
        .nth h1:nth-child(4){
            color: darkblue;
        }
 
    </style>
</head>
<body>
  <div>
    <h3>Home</h3>
    <h3>Home</h3>
    <h3>Home</h3>
    <h3>Home</h3>
  </div>
  <div class="main">
    <h3>Hello coding world</h3>
  </div>
  <div class="second">
      <p>HOME</p>
      <p>HOME</p>
      <p>HOME</p>
      <p>HOME</p>
      <p>HOME</p>
  </div>
  <div class="nth">
    <h1>Hello</h1>
    <h1>Hello</h1>
    <h1>Hello</h1>
    <h1>Hello</h1>
  </div>
</body>
</html>
