<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text decoration</title>
    <style>
        .main{
            border: 2px solid black;
            text-decoration:underline;
            text-decoration-color: blue;
            text-decoration-thickness: 2px;
        }
    </style>
</head>
<body>
    <div class="main">
      Lorem ipsum dolor sit amet consectetur adipisicing elit. Molestiae, quia laudantium voluptatem non quidem, suscipit unde eveniet dolor aliquam tempora totam eos quibusdam vero quod quae vitae sed, rerum cum.
    </div>
</body>
</html>
