<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>travel card</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body{
            height:100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: whitesmoke;
        }
        .card{
            width: 300px;
            background: white;
            border-radius: 15px;
            overflow: hidden;
            position: relative;
            box-shadow: 0px 5px 15px rgba(0,0,0,0.2)
           , green, blue, alpha;


        }
        .card img{
             width: 100%;
            height: 200px;
            object-fit: cover;
        }
        .flag{
            width: 60px;
            height: 60px;
            background: white;
           border-radius: 50%;
           position: absolute;
           top: 170px;
           left: 40%;
           transform: translate x (-50%);
           display: flex;
           justify-content: center;
           align-items: center;
           

           
         }
         .flag img{
            width: 40px;
            height: 40px;
            border-radius: 50%;

         }
         .content{
            text-align: center;
            padding: 35px 20px 15px;
         }
         .content h1{
            margin-bottom: 10px;
         }
         .content p{
            color: grey;
            line-height: 1.5;
            margin-bottom: 15px;
         }
         .line{
            width: 120px;
            height:2px;
            background: black;
            margin: 15px auto ;

         }
          h3{
            margin-top: 10px;
            font-size: 18px;
            text-align: center;
            
        
         }


        
    </style>
</head>
<body>
    <div class="card">
        <img src="https://media.istockphoto.com/id/1297043676/photo/eiffel-tower-in-spring.jpg?s=612x612&w=0&k=20&c=wsqn4e0r2g13fTAf7ZYOS18jZi1pZ3urX_x3K0p6L2w=" alt="Travel Card">
        <div class="flag">
        <img src="https://static.vecteezy.com/system/resources/thumbnails/007/686/727/small_2x/france-flag-circle-image-and-icon-free-vector.jpg" alt="flag of france">
    </div>
     <div class="content"> 
        <h1>Eifel Tower</h1>
        <p>A beautiful beach that has an amazing view and warm people.</p>
    </div>
    <div class="line"></div>
  <h3>#Eiffel #France</h3>
    </div>
    
</body>
</html>
