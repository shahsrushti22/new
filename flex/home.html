<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>justify content</title>
    <style>
        .main{
            width: 500px;
            height: 1000px;
            background: red;
            display: flex;
            flex-direction: column;
            justify-content:space-between;
             margin: auto;
        }
        .box1{
            background-color: green;
            width: 100px;
            height: 100px;

        }
        .box2{
            background-color: green;
            width: 100px;
            height: 100px;

        }
    </style>
</head>
<body>
    <div class="main">
        <div class="box1">Hello</div>
        <div class="box2">ws</div>
         
    </div>
</body>
</html>
